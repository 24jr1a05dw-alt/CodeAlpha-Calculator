<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#1b1b1b;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
align-items:flex-start;
}

.calculator{
width:480px;
background:#222;
border-radius:20px;
padding:15px;
box-shadow:0 0 25px rgba(0,0,0,.6);
}

.display{
width:100%;
height:80px;
background:#555;
border:none;
outline:none;
border-radius:12px;
color:white;
font-size:28px;
text-align:right;
padding:15px;
margin-bottom:12px;
}

.top-bar{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.mode-btn{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff9800;
color:white;
font-weight:bold;
cursor:pointer;
}

.buttons{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:8px;
}

button{
padding:15px;
border:none;
border-radius:10px;
background:#444;
color:white;
font-size:15px;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#666;
}

.equal{
background:#ff9800;
}

.equal:hover{
background:#ffb74d;
}

.history-panel{
width:280px;
background:#222;
border-radius:20px;
padding:15px;
color:white;
max-height:650px;
overflow-y:auto;
}

.history-panel h2{
margin-bottom:15px;
text-align:center;
}

.history-item{
padding:8px;
border-bottom:1px solid #444;
word-wrap:break-word;
}

</style>
</head>

<body>

<div class="container">

<div class="calculator">

<div class="top-bar">
<button id="modeBtn" class="mode-btn">DEG</button>
</div>

<input
type="text"
id="display"
class="display"
readonly
value="0"
title="Calculator display"
>

<div class="buttons">

<button id="AC">AC</button>
<button id="DEL">DEL</button>
<button>(</button>
<button>)</button>
<button id="Ans">Ans</button>
<button id="equal" class="equal">=</button>

<button id="sin">sin</button>
<button id="cos">cos</button>
<button id="tan">tan</button>
<button id="log">log</button>
<button id="ln">ln</button>
<button id="sqrt">√</button>

<button id="square">x²</button>
<button id="cube">x³</button>
<button id="inverse">x⁻¹</button>
<button id="power">xʸ</button>
<button id="pi">π</button>
<button id="factorial">x!</button>

<button id="sinh">sinh</button>
<button id="cosh">cosh</button>
<button id="tanh">tanh</button>
<button id="complex">i</button>
<button id="equation">Solve</button>
<button id="abs">abs</button>

<button>7</button>
<button>8</button>
<button>9</button>
<button>+</button>
<button id="nPr">nPr</button>
<button id="nCr">nCr</button>

<button>4</button>
<button>5</button>
<button>6</button>
<button>-</button>
<button>%</button>
<button id="CLR">CLR</button>

<button>1</button>
<button>2</button>
<button>3</button>
<button>*</button>
<button>0</button>
<button>.</button>

</div>

</div>

<div class="history-panel">

<h2>History</h2>

<div id="history">

</div>

</div>

</div>
<script>

const display = document.getElementById("display");
const history = document.getElementById("history");
const modeBtn = document.getElementById("modeBtn");

let currentInput = "";
let lastAnswer = 0;
let isDegree = true;

function updateDisplay() {
    display.value = currentInput || "0";
}

function addHistory(expression, result) {

    const item = document.createElement("div");

    item.classList.add("history-item");

    item.innerHTML = `
        ${expression}
        <br>
        =
        ${result}
    `;

    history.prepend(item);
}

modeBtn.addEventListener("click", () => {

    isDegree = !isDegree;

    modeBtn.textContent = isDegree ? "DEG" : "RAD";

});

document.querySelectorAll(".buttons button").forEach(button => {

    const text = button.innerText;

    if (
        ![
            "AC","DEL","Ans","=",
            "sin","cos","tan",
            "sinh","cosh","tanh",
            "log","ln","√",
            "x²","x³","x⁻¹",
            "xʸ","π","x!",
            "i","Solve","abs",
            "nPr","nCr","CLR"
        ].includes(text)
    ) {

        button.addEventListener("click", () => {

            currentInput += text;

            updateDisplay();

        });

    }

});

document.getElementById("AC").onclick = () => {

    currentInput = "";

    updateDisplay();

};

document.getElementById("CLR").onclick = () => {

    currentInput = "";

    updateDisplay();

};

document.getElementById("DEL").onclick = () => {

    currentInput = currentInput.slice(0,-1);

    updateDisplay();

};

document.getElementById("Ans").onclick = () => {

    currentInput += lastAnswer;

    updateDisplay();

};

document.getElementById("pi").onclick = () => {

    currentInput += "π";

    updateDisplay();

};

document.getElementById("factorial").onclick = () => {

    currentInput += "!";

    updateDisplay();

};

document.getElementById("complex").onclick = () => {

    currentInput += "i";

    updateDisplay();

};

document.getElementById("equation").onclick = () => {

    currentInput += "";

    updateDisplay();

};

document.getElementById("abs").onclick = () => {

    currentInput += "abs(";

    updateDisplay();

};

document.getElementById("sqrt").onclick = () => {

    currentInput += "sqrt(";

    updateDisplay();

};

document.getElementById("square").onclick = () => {

    currentInput += "^2";

    updateDisplay();

};

document.getElementById("cube").onclick = () => {

    currentInput += "^3";

    updateDisplay();

};

document.getElementById("inverse").onclick = () => {

    currentInput = "1/(" + currentInput + ")";

    updateDisplay();

};

document.getElementById("power").onclick = () => {

    currentInput += "^";

    updateDisplay();

};

document.getElementById("log").onclick = () => {

    currentInput += "log(";

    updateDisplay();

};

document.getElementById("ln").onclick = () => {

    currentInput += "ln(";

    updateDisplay();

};

document.getElementById("sin").onclick = () => {

    currentInput += "sin(";

    updateDisplay();

};

document.getElementById("cos").onclick = () => {

    currentInput += "cos(";

    updateDisplay();

};

document.getElementById("tan").onclick = () => {

    currentInput += "tan(";

    updateDisplay();

};

document.getElementById("sinh").onclick = () => {

    currentInput += "sinh(";

    updateDisplay();

};

document.getElementById("cosh").onclick = () => {

    currentInput += "cosh(";

    updateDisplay();

};

document.getElementById("tanh").onclick = () => {

    currentInput += "tanh(";

    updateDisplay();

};

document.getElementById("nPr").onclick = () => {

    currentInput += "nPr(";

    updateDisplay();

};

document.getElementById("nCr").onclick = () => {

    currentInput += "nCr(";

    updateDisplay();

};

function factorial(n) {

    if (n < 0) return NaN;

    let result = 1;

    for (let i = 2; i <= n; i++) {

        result *= i;

    }

    return result;
}

function nPr(n,r) {

    return factorial(n) / factorial(n-r);

}

function nCr(n,r) {

    return factorial(n) /
           (factorial(r) * factorial(n-r));

}

function solveLinear(eq) {

    eq = eq.replace(/\s/g,'');

    let parts = eq.split('=');

    if(parts.length !== 2) return "Invalid";

    let left = parts[0];

    let right = Number(parts[1]);

    let match =
    left.match(
    /^([+-]?\d*)x([+-]\d+)?$/
    );

    if(!match)
        return "Invalid";

    let a =
    match[1] === '' ||
    match[1] === '+'
    ? 1 :
    match[1] === '-'
    ? -1 :
    Number(match[1]);

    let b =
    Number(match[2] || 0);

    return (right - b)/a;

}

</script>
<script>

document.getElementById("equal").onclick = () => {

    try {

        if (
            currentInput.includes("x") &&
            currentInput.includes("=")
        ) {

            let solution =
            solveLinear(currentInput);

            addHistory(
                currentInput,
                "x = " + solution
            );

            currentInput =
            "x = " + solution;

            updateDisplay();

            return;
        }

        if(currentInput.includes("i")){

            addHistory(
                currentInput,
                "Complex Number"
            );

            currentInput =
            "Complex Number";

            updateDisplay();

            return;
        }

        let expression = currentInput;

        expression = expression.replace(/π/g, Math.PI);

        expression = expression.replace(/\^/g, "**");

        expression = expression.replace(
            /(\d+)!/g,
            (_,n)=>
            factorial(
                Number(n)
            )
        );

        expression = expression.replace(
            /sin\(([^()]*)\)/g,
            (_, x) => {

                let value = Number(
                    Function("return " + x)()
                );

                if (isDegree) {
                    value =
                    value * Math.PI / 180;
                }

                return Math.sin(value);
            }
        );

        expression = expression.replace(
            /cos\(([^()]*)\)/g,
            (_, x) => {

                let value = Number(
                    Function("return " + x)()
                );

                if (isDegree) {
                    value =
                    value * Math.PI / 180;
                }

                return Math.cos(value);
            }
        );

        expression = expression.replace(
            /tan\(([^()]*)\)/g,
            (_, x) => {

                let value = Number(
                    Function("return " + x)()
                );

                if (isDegree) {
                    value =
                    value * Math.PI / 180;
                }

                return Math.tan(value);
            }
        );

        expression = expression.replace(
            /sinh\(([^()]*)\)/g,
            (_, x) =>
            Math.sinh(
                Number(
                    Function("return " + x)()
                )
            )
        );

        expression = expression.replace(
            /cosh\(([^()]*)\)/g,
            (_, x) =>
            Math.cosh(
                Number(
                    Function("return " + x)()
                )
            )
        );

        expression = expression.replace(
            /tanh\(([^()]*)\)/g,
            (_, x) =>
            Math.tanh(
                Number(
                    Function("return " + x)()
                )
            )
        );

        expression = expression.replace(
            /sqrt\(([^()]*)\)/g,
            (_, x) =>
            Math.sqrt(
                Number(
                    Function("return " + x)()
                )
            )
        );

        expression = expression.replace(
            /log\(([^()]*)\)/g,
            (_, x) =>
            Math.log10(
                Number(
                    Function("return " + x)()
                )
            )
        );

        expression = expression.replace(
            /ln\(([^()]*)\)/g,
            (_, x) =>
            Math.log(
                Number(
                    Function("return " + x)()
                )
            )
        );

        expression = expression.replace(
            /abs\(([^()]*)\)/g,
            (_,x)=>
            Math.abs(
                Number(
                    Function(
                        "return "+x
                    )()
                )
            )
        );

        expression = expression.replace(
            /nPr\((\d+),(\d+)\)/g,
            (_, n, r) =>
            nPr(
                Number(n),
                Number(r)
            )
        );

        expression = expression.replace(
            /nCr\((\d+),(\d+)\)/g,
            (_, n, r) =>
            nCr(
                Number(n),
                Number(r)
            )
        );

        let result = Function(
            '"use strict"; return (' +
            expression +
            ')'
        )();

        if (
            result === undefined ||
            Number.isNaN(result)
        ) {

            throw new Error();

        }

        addHistory(
            currentInput,
            result
        );

        lastAnswer = result;

        currentInput =
        result.toString();

    }
    catch {

        currentInput =
        "Error";

    }

    updateDisplay();

};

document.addEventListener(
    "keydown",
    (e) => {

        if (
            "0123456789+-*/().%=x"
            .includes(e.key)
        ) {

            currentInput +=
            e.key;

            updateDisplay();

        }

        if (
            e.key === "Enter"
        ) {

            document
            .getElementById("equal")
            .click();

        }

        if (
            e.key ===
            "Backspace"
        ) {

            currentInput =
            currentInput.slice(
                0,
                -1
            );

            updateDisplay();

        }

        if (
            e.key ===
            "Escape"
        ) {

            currentInput = "";

            updateDisplay();

        }

    }
);

updateDisplay();

</script>

</body>
</html>
